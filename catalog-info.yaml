apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: payment-service
  description: Core payment processing microservice handling transactions, refunds, and payment method management
  annotations:
    github.com/project-slug: backstage-demo-app/payment-service
    backstage.io/techdocs-ref: dir:.
  links:
    - title: GitHub Repository
      url: https://github.com/backstage-demo-app/payment-service
      icon: github
spec:
  type: service
  lifecycle: experimental
  owner: group:default/stargate
  system: demo-platform
  providesApis:
    - payment-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: payment-api
  description: REST API for payment processing — transactions, refunds, and payment method management
  tags:
    - rest
    - payments
    - java
    - spring-boot
spec:
  type: openapi
  lifecycle: production
  owner: group:paybusters
  system: demo-platform
  definition: |
    openapi: 3.0.0
    info:
      title: Payment API
      version: 1.0.0
      description: Payment processing service API
    servers:
      - url: http://localhost:8080
    paths:
      /api/payments:
        get:
          summary: List all payments
          parameters:
            - name: status
              in: query
              schema:
                type: string
                enum: [pending, completed, refunded]
            - name: page
              in: query
              schema:
                type: integer
            - name: size
              in: query
              schema:
                type: integer
          responses:
            '200':
              description: Paginated list of payments
        post:
          summary: Create a new payment
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    amount:
                      type: number
                    currency:
                      type: string
                    method:
                      type: string
                    description:
                      type: string
          responses:
            '201':
              description: Payment created
      /api/payments/{id}:
        get:
          summary: Get payment by ID
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Payment details
            '404':
              description: Payment not found
      /api/payments/{id}/refund:
        post:
          summary: Refund a payment
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
          requestBody:
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    reason:
                      type: string
          responses:
            '200':
              description: Payment refunded
            '409':
              description: Already refunded
