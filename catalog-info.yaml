apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: payment-service
  description: Core payment processing microservice — transactions, refunds, stats, and payment method management
  annotations:
    github.com/project-slug: backstage-demo-app/payment-service
    backstage.io/techdocs-ref: dir:.
  links:
    - title: GitHub Repository
      url: https://github.com/backstage-demo-app/payment-service
      icon: github
spec:
  type: service
  lifecycle: production
  owner: group:default/paybusters
  system: system:default/demo-platform
  providesApis:
    - payment-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: payment-api
  description: REST API for payment processing — transactions, refunds, stats, and payment method management
  tags:
    - rest
    - payments
    - java
    - spring-boot
spec:
  type: openapi
  lifecycle: production
  owner: group:default/paybusters
  system: system:default/demo-platform
  definition:
    $text: http://localhost:8080/v3/api-docs.yaml
